<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Spring AI Chat</title>

    <style>

        body {
            width: 900px;
            margin: 40px auto;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .response {
            margin-top: 25px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            background-color: #f8f8f8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table,th, td {
            border: 1px solid #ccc;
        }

        th {
            background-color: #eaeaea;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        h2 {
            color: #333;
        }

        h3 {
            color: #555;
        }

        ul {
            padding-left: 20px;
        }

        p {
            line-height: 1.6;
        }

    </style>

</head>

<body>

    <h1>Spring AI Chat Application</h1>

    <form action="/chat" method="post">
        <textarea name="prompt" placeholder="Ask anything..." th:text="${prompt}"></textarea>
        <br>
        <button type="submit">Send</button>
    </form>
	
    <div class="response" th:if="${response}">
        <h3>AI Response</h3>
        <div th:utext="${response}"></div>
    </div>

</body>

</html>
